name: syncmaster
options:
  bundleIdPrefix: com.syncmaster
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.2"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.syncmaster.syncmaster
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 59X23J2UYA
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  syncmaster:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: syncmaster
        excludes:
          - "**/*.md"
    info:
      path: syncmaster/Info.plist
      properties:
        CFBundleName: SyncMaster
        CFBundleDisplayName: SyncMaster
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSPhotoLibraryUsageDescription: "SyncMaster needs access to your photo library to back up your media to your home server."
        NSCameraUsageDescription: "SyncMaster needs camera access for future features."
        NSLocalNetworkUsageDescription: "SyncMaster needs local network access to connect to your media server."
        NSBonjourServices:
          - _syncmaster._tcp
        BGTaskSchedulerPermittedIdentifiers:
          - com.syncmaster.syncmaster.sync
        UIBackgroundModes:
          - background-fetch
          - background-processing
        UILaunchScreen:
          UIColorName: SystemBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: syncmaster/syncmaster.entitlements
    settings:
      base:
        INFOPLIST_FILE: syncmaster/Info.plist
        CODE_SIGN_ENTITLEMENTS: syncmaster/syncmaster.entitlements

  syncmasterTests:
    type: bundle.unit-test
    platform: iOS
    sources: syncmasterTests
    dependencies:
      - target: syncmaster

  syncmasterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: syncmasterUITests
    dependencies:
      - target: syncmaster
